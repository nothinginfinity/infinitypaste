<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InfinityPaste">
  <title>InfinityPaste</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* ── Layout shell ─────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg,#0f0f0f);color:var(--text,#f0f0f0);}

    #app{display:flex;flex-direction:column;height:100dvh;height:100vh;}

    /* ── Header ───────────────────────────────────────────── */
    .app-header{
      background:var(--surface,#1a1a1a);
      border-bottom:1px solid var(--border,#2a2a2a);
      flex-shrink:0;
      padding-top:env(safe-area-inset-top);
    }
    .header-inner{
      height:52px;display:flex;align-items:center;
      justify-content:space-between;padding:0 1rem;
    }
    .app-title{font-size:1.1rem;font-weight:700;letter-spacing:-.01em;}
    .header-actions{display:flex;gap:.4rem;}
    .btn-icon{
      background:none;border:none;font-size:1.25rem;padding:.35rem .45rem;
      cursor:pointer;color:var(--text-muted,#999);border-radius:8px;
      transition:background .15s;-webkit-tap-highlight-color:transparent;
    }
    .btn-icon:active{background:var(--surface2,#252525);}

    /* ── Main scrollable area ─────────────────────────────── */
    .app-main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}

    /* ── Bottom Tab Bar ───────────────────────────────────── */
    .tab-bar{
      display:flex;
      background:var(--surface,#1a1a1a);
      border-top:1px solid var(--border,#2a2a2a);
      flex-shrink:0;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .tab-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:3px;
      font-size:.68rem;font-weight:500;
      color:var(--text-faint,#555);
      background:none;border:none;cursor:pointer;
      padding:.55rem .25rem;
      transition:color .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .tab-btn .tab-icon{font-size:1.35rem;line-height:1;}
    .tab-btn.tab-btn--active{color:var(--accent,#3b82f6);}
    .tab-btn:active{opacity:.7;}

    /* ── Tab Panels ───────────────────────────────────────── */
    .tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;}
    .tab-panel.tab-panel--active{display:flex;}

    /* ── Panel toolbar ────────────────────────────────────── */
    .panel-toolbar{
      padding:.75rem 1rem .6rem;
      display:flex;flex-direction:column;gap:.5rem;
      border-bottom:1px solid var(--border,#2a2a2a);
      flex-shrink:0;background:var(--bg,#0f0f0f);
    }
    .text-input{
      width:100%;background:var(--surface2,#252525);
      border:1px solid var(--border,#2a2a2a);
      border-radius:10px;padding:.7rem .85rem;
      color:var(--text,#f0f0f0);font-size:.95rem;
      resize:none;outline:none;font-family:inherit;
      transition:border-color .15s;
    }
    .text-input:focus{border-color:var(--accent,#3b82f6);}
    .text-input::placeholder{color:var(--text-faint,#555);}

    /* Fetch bar */
    .fetch-bar{
      display:none;flex-direction:row;gap:.5rem;
      align-items:center;flex-wrap:wrap;padding-top:.1rem;
    }
    .fetch-bar.visible{display:flex;}
    #fetch-status{font-size:.78rem;color:var(--text-faint,#555);}

    /* AutoTitle bar */
    .autotitle-bar{
      display:none;font-size:.78rem;
      color:var(--text-faint,#555);padding-top:.1rem;
    }
    .autotitle-bar.visible{display:block;}

    .toolbar-actions{display:flex;gap:.45rem;flex-wrap:wrap;}

    /* ── Buttons ──────────────────────────────────────────── */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:.3rem;
      font-family:inherit;font-weight:600;font-size:.82rem;
      padding:.48rem .95rem;border-radius:8px;border:none;cursor:pointer;
      transition:opacity .15s,filter .15s;-webkit-tap-highlight-color:transparent;
      white-space:nowrap;
    }
    .btn:active{opacity:.75;}
    .btn-sm{font-size:.78rem;padding:.38rem .75rem;}
    .btn-primary,.btn--primary{background:var(--accent,#3b82f6);color:#fff;}
    .btn-secondary,.btn--secondary{background:var(--surface2,#252525);color:var(--text,#f0f0f0);border:1px solid var(--border,#2a2a2a);}
    .btn-danger{background:#dc2626;color:#fff;}
    .file-upload-label{cursor:pointer;}

    /* ── Cards ────────────────────────────────────────────── */
    .card-list{padding:.5rem .75rem 1.5rem;display:flex;flex-direction:column;gap:.45rem;}
    .card{
      background:var(--surface,#1a1a1a);
      border:1px solid var(--border,#2a2a2a);
      border-radius:10px;padding:.75rem;
    }
    .card-meta{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:.3rem;}
    .card-label{
      font-size:.7rem;font-weight:600;color:var(--accent,#3b82f6);
      background:rgba(59,130,246,.13);border-radius:4px;padding:1px 6px;
    }
    .card-source,.card-count,.card-time{font-size:.67rem;color:var(--text-faint,#555);}
    .card-preview{
      white-space:pre-wrap;word-break:break-word;
      font-size:.84rem;line-height:1.55;color:var(--text-muted,#aaa);
      padding:.25rem 0;
    }
    .card-actions{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.45rem;}
    .card-btn{
      background:var(--surface2,#252525);border:1px solid var(--border,#2a2a2a);
      border-radius:6px;padding:.3rem .55rem;font-size:.8rem;cursor:pointer;
      color:var(--text-muted,#aaa);transition:background .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .card-btn:active{background:var(--border,#2a2a2a);}
    .card-btn--copy{color:var(--accent,#3b82f6);}
    .card-btn--delete{color:#dc2626;}

    /* ── Recording tab ────────────────────────────────────── */
    .record-controls{
      display:flex;flex-direction:column;align-items:center;
      padding:2.5rem 1rem 1.5rem;gap:1.25rem;flex-shrink:0;
    }
    .record-timer{
      font-size:2.4rem;font-weight:700;letter-spacing:.05em;
      color:var(--text,#f0f0f0);font-variant-numeric:tabular-nums;
    }
    .record-buttons{display:flex;gap:.75rem;}

    /* ── Stitch area ──────────────────────────────────────── */
    .stitch-item{
      display:inline-flex;align-items:center;gap:5px;
      background:var(--surface2,#252525);border:1px solid var(--border,#2a2a2a);
      border-radius:6px;padding:3px 8px;font-size:.78rem;color:var(--text-muted,#aaa);
    }
    .stitch-item button{background:none;border:none;cursor:pointer;color:#dc2626;font-size:.8rem;padding:0 2px;}

    /* ── File viewer ──────────────────────────────────────── */
    .file-viewer{
      border-top:1px solid var(--border,#2a2a2a);
      background:var(--bg,#0f0f0f);
    }
    .file-viewer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:.75rem 1rem;border-bottom:1px solid var(--border,#2a2a2a);
    }
    .file-viewer-title{font-size:.88rem;font-weight:600;color:var(--text,#f0f0f0);}
    .file-viewer-content{padding:.75rem 1rem;overflow:auto;max-height:40dvh;}

    /* ── Empty states ─────────────────────────────────────── */
    .empty-state{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:3.5rem 1rem;
      color:var(--text-faint,#555);text-align:center;gap:.4rem;flex:1;
    }
    .empty-state-icon{font-size:2.5rem;margin-bottom:.5rem;}
    .empty-state p{font-size:.9rem;}

    /* ── Settings Modal ───────────────────────────────────── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.75);
      z-index:1000;display:flex;align-items:flex-end;justify-content:center;
    }
    .modal{
      background:var(--surface,#1a1a1a);
      border-radius:16px 16px 0 0;
      width:100%;max-width:600px;max-height:90dvh;
      overflow-y:auto;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .modal-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:1rem 1.1rem;border-bottom:1px solid var(--border,#2a2a2a);
      position:sticky;top:0;background:var(--surface,#1a1a1a);z-index:1;
    }
    .modal-title{font-size:1rem;font-weight:700;}
    .modal-body{padding:.25rem 0;}
    .modal-footer{padding:1rem 1.1rem;border-top:1px solid var(--border,#2a2a2a);}

    .setting-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:.75rem 1.1rem;border-bottom:1px solid var(--border,#2a2a2a);
      font-size:.9rem;gap:.75rem;flex-wrap:wrap;
    }
    .setting-label{font-weight:500;color:var(--text-muted,#aaa);flex-shrink:0;}
    .setting-input{
      background:var(--surface2,#252525);border:1px solid var(--border,#2a2a2a);
      border-radius:8px;padding:.4rem .65rem;
      color:var(--text,#f0f0f0);font-size:.85rem;outline:none;
      max-width:200px;width:100%;transition:border-color .15s;
    }
    .setting-input:focus{border-color:var(--accent,#3b82f6);}
    .settings-value{font-size:.82rem;color:var(--text-faint,#555);}

    .bookmarklet-output{
      display:none;margin-top:8px;word-break:break-all;
      font-size:.75rem;font-family:monospace;
      background:var(--surface2,#252525);
      border:1px solid var(--border,#2a2a2a);
      padding:10px;border-radius:8px;color:var(--text-muted,#aaa);
      width:100%;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast-container{
      position:fixed;bottom:calc(env(safe-area-inset-bottom) + 5rem);
      left:50%;transform:translateX(-50%);
      z-index:9999;display:flex;flex-direction:column;
      gap:.5rem;align-items:center;pointer-events:none;
    }
    .toast{
      background:#1f2937;color:#f9fafb;
      padding:.6rem 1.1rem;border-radius:999px;
      font-size:.84rem;font-weight:500;
      box-shadow:0 4px 20px rgba(0,0,0,.6);
      opacity:0;transform:translateY(12px);
      transition:opacity .22s,transform .22s;
      white-space:nowrap;
    }
    .toast--visible{opacity:1;transform:translateY(0);}
    .toast--error{background:#7f1d1d;color:#fca5a5;}
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <span class="app-title">∞ InfinityPaste</span>
        <div class="header-actions">
          <button class="btn-icon" onclick="pasteFromClipboard()" title="Paste from clipboard">📋</button>
          <button class="btn-icon" onclick="openSettings()" title="Settings">⚙️</button>
        </div>
      </div>
    </header>

    <!-- Main content area -->
    <main class="app-main">

      <!-- ── Queue Tab ───────────────────────────────────── -->
      <div class="tab-panel tab-panel--active" id="panel-queue">
        <div class="panel-toolbar">
          <textarea id="text-input" class="text-input" rows="3"
            placeholder="Type, paste, or drop a URL here…"
            oninput="onCollectInput()"></textarea>

          <div id="fetch-bar" class="fetch-bar">
            <button class="btn btn-primary btn-sm" onclick="fetchUrl()">🌐 Fetch URL</button>
            <button class="btn btn-secondary btn-sm" onclick="saveUrlAsFile()">💾 Save as File</button>
            <span id="fetch-status"></span>
          </div>

          <div id="autotitle-bar" class="autotitle-bar">
            ✨ <span id="autotitle-suggestion"></span>
          </div>

          <div class="toolbar-actions">
            <button class="btn btn-primary btn-sm" onclick="submitText()">Add to Queue</button>
            <button class="btn btn-secondary btn-sm" onclick="detectAllLanguages()" title="Auto-tag languages">🌐 Languages</button>
            <button class="btn btn-danger btn-sm" onclick="clearQueue()">🗑 Clear</button>
          </div>
        </div>
        <div id="queue-list" class="card-list"></div>
      </div>

      <!-- ── Record Tab ──────────────────────────────────── -->
      <div class="tab-panel" id="panel-record">
        <div class="record-controls">
          <div class="record-timer" id="rec-timer">00:00</div>
          <div class="record-buttons">
            <button id="rec-btn-start" class="btn btn-primary" onclick="startRecording()">⏺ Record</button>
            <button id="rec-btn-stop" class="btn btn-danger" onclick="stopRecording()" disabled>⏹ Stop</button>
          </div>
        </div>
        <div id="recordings-list" class="card-list"></div>
      </div>

      <!-- ── Files Tab ───────────────────────────────────── -->
      <div class="tab-panel" id="panel-files">
        <div class="panel-toolbar">
          <label class="btn btn-primary btn-sm file-upload-label">
            📎 Upload Files
            <input type="file" multiple accept="image/*,.pdf,.txt,.md,.csv,.json"
              onchange="handleFileUpload(this)" style="display:none">
          </label>
        </div>
        <div id="files-list" class="card-list"></div>

        <div id="stitch-area" style="display:none;padding:12px 16px 16px;border-top:1px solid var(--border,#2a2a2a);">
          <div style="font-weight:600;margin-bottom:8px;font-size:.9rem;">🧵 Table Stitch Queue</div>
          <div id="stitch-queue-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
          <button id="stitch-btn" class="btn btn-primary btn-sm" onclick="stitchTables()">🧵 Stitch Tables</button>
        </div>

        <div id="file-viewer" style="display:none" class="file-viewer">
          <div class="file-viewer-header">
            <span id="file-viewer-title" class="file-viewer-title"></span>
            <button class="btn-icon" onclick="closeViewer()">✕</button>
          </div>
          <div id="file-viewer-content" class="file-viewer-content"></div>
        </div>
      </div>

    </main>

    <!-- ── Bottom Tab Bar ──────────────────────────────────── -->
    <nav class="tab-bar">
      <button class="tab-btn tab-btn--active" data-tab="queue">
        <span class="tab-icon">📋</span>Queue
      </button>
      <button class="tab-btn" data-tab="record">
        <span class="tab-icon">🎙️</span>Record
      </button>
      <button class="tab-btn" data-tab="files">
        <span class="tab-icon">📁</span>Files
      </button>
    </nav>

  </div><!-- /#app -->

  <div id="toast-container" class="toast-container"></div>

  <!-- ── Settings Modal ───────────────────────────────────── -->
  <div id="settings-modal" class="modal-overlay" style="display:none"
    onclick="if(event.target===this)closeSettings()">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">⚙️ Settings</h2>
        <button class="btn-icon" onclick="closeSettings()">✕</button>
      </div>

      <div class="modal-body">

        <!-- API -->
        <div class="setting-row">
          <label class="setting-label" for="setting-key">OpenAI API Key</label>
          <input id="setting-key" type="password" class="setting-input" placeholder="sk-…">
        </div>
        <div class="setting-row">
          <label class="setting-label" for="setting-model">Model</label>
          <select id="setting-model" class="setting-input">
            <option value="gpt-4o">gpt-4o</option>
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="gpt-4-turbo">gpt-4-turbo</option>
            <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
          </select>
        </div>

        <!-- Display -->
        <div class="setting-row">
          <label class="setting-label" for="setting-theme">Theme</label>
          <select id="setting-theme" class="setting-input">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="setting-row">
          <label class="setting-label" for="setting-timestamps">Show timestamps</label>
          <input id="setting-timestamps" type="checkbox" checked>
        </div>

        <!-- Bookmarklet -->
        <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:.5rem;">
          <div class="setting-label">🔖 Safari Bookmarklet</div>
          <div style="font-size:.78rem;color:var(--text-faint,#555);line-height:1.4;">
            Generates a bookmark — tap it on any page to send the full text to InfinityPaste.
          </div>
          <button class="btn btn-secondary btn-sm" onclick="generateBookmarklet()">Generate Bookmarklet</button>
          <div id="bookmarklet-output" class="bookmarklet-output"></div>
        </div>

        <!-- Data -->
        <div class="setting-row" style="gap:.5rem;">
          <span class="setting-label">Data</span>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
            <button class="btn btn-secondary btn-sm" onclick="exportData()">⬆️ Export</button>
            <label class="btn btn-secondary btn-sm file-upload-label">
              ⬇️ Import
              <input type="file" accept=".json" onchange="importData(this)" style="display:none">
            </label>
          </div>
        </div>

        <!-- Version -->
        <div class="setting-row">
          <span class="setting-label">Version</span>
          <span class="settings-value">5.0.0</span>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" style="width:100%" onclick="saveSettingsFromForm()">Save Settings</button>
      </div>
    </div>
  </div>

  <script>
    // Patch: ensure onCollectInput, fetchUrl, saveUrlAsFile, generateBookmarklet
    // exist even if app.js hasn't defined them yet (graceful no-op fallbacks)
    window.onCollectInput = window.onCollectInput || function() {
      const val = document.getElementById('text-input')?.value || '';
      const isUrl = /^https?:\/\/\S+/i.test(val.trim());
      const fb = document.getElementById('fetch-bar');
      const atb = document.getElementById('autotitle-bar');
      if (fb) fb.classList.toggle('visible', isUrl);
      if (atb && !isUrl) atb.classList.remove('visible');
    };
    window.fetchUrl = window.fetchUrl || function(){ alert('fetchUrl not loaded yet — check app.js'); };
    window.saveUrlAsFile = window.saveUrlAsFile || function(){ alert('saveUrlAsFile not loaded yet — check app.js'); };
    window.generateBookmarklet = window.generateBookmarklet || function(){
      const out = document.getElementById('bookmarklet-output');
      if (!out) return;
      const code = `javascript:(function(){var t=document.body.innerText;window.opener&&window.opener.postMessage({type:'infinitypaste',text:t},'*');var w=window.open('','_blank');w&&w.postMessage({type:'infinitypaste',text:t},'*');prompt('Copy and paste into InfinityPaste:',t);})();`;
      out.textContent = code;
      out.style.display = 'block';
      navigator.clipboard?.writeText(code).then(()=>showToast&&showToast('Bookmarklet copied!')).catch(()=>{});
    };
  </script>
  <script src="./app.js"></script>
</body>
</html>
